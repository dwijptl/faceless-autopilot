name: Make Video

on:
  schedule:
    # Mon / Wed / Fri at 06:30 UTC — edit freely (crontab.guru)
    - cron: "30 6 * * 1,3,5"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional: force a specific topic (leave empty for auto)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: make-video
  cancel-in-progress: false

jobs:
  make-video:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg espeak-ng fonts-dejavu-core

      - name: Cache Kokoro TTS model (~340 MB, downloaded once)
        uses: actions/cache@v4
        with:
          path: ~/.cache/kokoro
          key: kokoro-model-v1.0

      - name: Set up Node (for the Remotion renderer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Remotion node_modules (includes headless Chrome)
        uses: actions/cache@v4
        with:
          path: remotion/node_modules
          key: remotion-${{ hashFiles('remotion/package.json') }}

      - name: Node dependencies (Remotion)
        working-directory: remotion
        run: npm install --no-audit --no-fund

      - name: Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FORCED_TOPIC: ${{ github.event.inputs.topic }}
        run: python pipeline/run.py

      - name: Publish release (your dated "folder")
        env:
          GH_TOKEN: ${{ github.token }}
          STAMP: ${{ steps.pipeline.outputs.stamp }}
          OUTDIR: ${{ steps.pipeline.outputs.dir }}
          VTITLE: ${{ steps.pipeline.outputs.title }}
        run: |
          gh release create "video-$STAMP" \
            "$OUTDIR/final.mp4" \
            "$OUTDIR/captions.srt" \
            "$OUTDIR/thumbnail.jpg" \
            "$OUTDIR/script.json" \
            --title "$STAMP — $VTITLE" \
            --notes-file "$OUTDIR/metadata.md"

      - name: Save topic history
        run: |
          git config user.name "faceless-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add topics_done.txt
          git commit -m "log topic (${{ steps.pipeline.outputs.stamp }})" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
