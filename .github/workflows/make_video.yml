name: Make Video

on:
  schedule:
    # Mon + Thu at 05:00 UTC (= 10:30 AM IST) — video is ready by lunch.
    # Review it, then SCHEDULE the YouTube publish for 16:00-17:30 IST
    # (Hindi long-form viewing peaks 6-8 PM IST). Edit freely (crontab.guru).
    - cron: "0 5 * * 1,4"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional: force a specific topic (leave empty for auto)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: make-video
  cancel-in-progress: false

jobs:
  make-video:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: System dependencies (incl. Devanagari fonts for Hindi text)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg espeak-ng fonts-dejavu-core fonts-noto-core

      - name: Cache Kokoro TTS model (fallback voice, downloaded only if used)
        uses: actions/cache@v4
        with:
          path: ~/.cache/kokoro
          key: kokoro-model-v1.0

      - name: Set up Node (for the Remotion renderer)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Remotion node_modules (includes headless Chrome)
        uses: actions/cache@v4
        with:
          path: remotion/node_modules
          key: remotion-${{ hashFiles('remotion/package.json') }}

      - name: Node dependencies (Remotion)
        working-directory: remotion
        run: npm install --no-audit --no-fund

      - name: Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          SARVAM_SPEAKER: ${{ secrets.SARVAM_SPEAKER }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCED_TOPIC: ${{ github.event.inputs.topic }}
        run: python pipeline/run.py

      - name: Publish release (your dated "folder")
        env:
          GH_TOKEN: ${{ github.token }}
          STAMP: ${{ steps.pipeline.outputs.stamp }}
          OUTDIR: ${{ steps.pipeline.outputs.dir }}
          VTITLE: ${{ steps.pipeline.outputs.title }}
        run: |
          gh release create "video-$STAMP" \
            "$OUTDIR/final.mp4" \
            "$OUTDIR/captions.srt" \
            "$OUTDIR/thumbnail.jpg" \
            "$OUTDIR/script.json" \
            --title "$STAMP — $VTITLE" \
            --notes-file "$OUTDIR/metadata.md"

      - name: Save topic history + asset usage log
        run: |
          git config user.name "faceless-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add topics_done.txt assets_used.json
          git commit -m "log run (${{ steps.pipeline.outputs.stamp }})" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
