        run: |
          printf '%s' "$BUNDLE_B64" | base64 --decode > /tmp/reliability.bundle
          git config user.name "faceless-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git fetch /tmp/reliability.bundle main:refs/remotes/local/reliability
          git cherry-pick 02f174e6b03ab5f41aaf6400560b81478ac7e445
          git cherry-pick c44e47da41f37d3ee31eea3a4ba0db6c363e1307
          git cherry-pick b4c339163341c8c8507298bf62bd05c652683c78
          git restore --source="$GITHUB_SHA" -- .github/workflows/make_video.yml .github/workflows/make_short.yml .github/workflows/publish-reliability.yml
          git rm -f .github/workflows/ci.yml
          git add .github/workflows/make_video.yml .github/workflows/make_short.yml
          git commit -m "Defer workflow files to browser publish"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify Python
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pytest -q
          python -m compileall -q pipeline

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify Remotion
        working-directory: remotion
        run: |
          npm install --no-audit --no-fund
          npx tsc --noEmit
          npx remotion compositions src/index.ts
          npx remotion browser ensure
          npx remotion still src/index.ts Thumb /tmp/thumb.jpg --props ../tests/fixtures/props.json
          npx remotion render src/index.ts Main /tmp/main.mp4 --props ../tests/fixtures/props.json --frames=0-15 --concurrency=1
          npx remotion render src/index.ts Short /tmp/short.mp4 --props ../tests/fixtures/props.json --frames=0-15 --concurrency=1

      - name: Publish commits
        run: git push origin HEAD:main
