name: Codex Long-form Publisher

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply verified long-form patch
        run: |
          base64 --decode .codex/longform-quality-v1.tgz.b64 > /tmp/longform-quality-v1.tgz
          tar -xzf /tmp/longform-quality-v1.tgz
          find . -type f -name '._*' -delete
          git checkout -- .github/workflows/make_video.yml
          rm -f .codex/longform-quality-v1.tgz.b64
          rmdir .codex 2>/dev/null || true
          git config user.name "faceless-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Upgrade long-form semantic editing"
          git pull --rebase origin main
          git push origin HEAD:main
