name: Codex Publish
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified source patch
        env:
          PATCH_PAYLOAD: 
        run: |
          printf '%s' "$PATCH_PAYLOAD" | base64 -d | gzip -d > /tmp/faceless-glass.patch
          git config user.name "Codex"
          git config user.email "codex@users.noreply.github.com"
          git am /tmp/faceless-glass.patch
          git push origin HEAD:main
