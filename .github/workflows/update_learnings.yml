name: Update Learnings

on:
  schedule:
    # Sunday 07:00 UTC — digest whatever CSVs are in analytics/
    - cron: "0 7 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install requests pyyaml
      - name: Digest analytics into learnings.md
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python pipeline/analytics.py
      - name: Commit learnings
        run: |
          git config user.name "faceless-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add learnings.md
          git commit -m "update learnings from analytics" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
