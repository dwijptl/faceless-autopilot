# ── Faceless Autopilot configuration ─────────────────────────────
# Edit this file on GitHub (pencil icon) — no other setup needed.

channel:
  # The seed for ALL auto-generated topics. Change this to pivot the channel.
  niche: >
    Hidden places and mind-bending realities of Earth and the universe —
    cinematic documentary explainers across three families:
    (1) EARTH'S EXTREMES & MYSTERIES: deserts, deep ocean, poles, forbidden
    islands, strange geology; (2) SPACE & THE COSMOS: black holes, planets,
    deep-space probes, cosmic scale, the fate of stars; (3) WHAT-IF
    SCENARIOS grounded in real physics: Earth stops spinning, humans vanish,
    oceans drain. Hard rules: every topic must be illustrable with
    nature/space stock footage plus AI stills — no news events, no real or
    named people, no religion or mythology, no politics or conspiracies.
  tone: "curious, cinematic, documentary — like a calm narrator revealing something surprising"
  audience: "curious Hindi-speaking adults who love maps, space and science"
  language: "hi-IN"        # BCP-47; drives script language + Sarvam TTS.
                           # Switch back to "en-us" for English.
  wpm: 130                 # spoken words/minute (Hindi narration ~130; English 150)

video:
  target_minutes: 6.25     # aim: story finishes naturally inside 5:30-7:00;
                           # word budget enforced pre-TTS (see channel.wpm)
  scenes_min: 8
  scenes_max: 12
  width: 1920
  height: 1080
  fps: 30
  bitrate: "6000k"
  crossfade: 0.4           # seconds between scenes
  max_shot_seconds: 5      # normal long-form visual beat ceiling
  outro_seconds: 4         # branded end card appended to every video

# Retention story engine — deterministic pre-TTS audit of the script's
# curiosity architecture (promise ladder, reveal placement, open loops,
# reward gaps, flat progress, claim/display sync). Failures trigger up to
# max_revisions free repair calls; what happens after that is `gate`:
#   off   = report only
#   draft = render normally, mark the release ⚠️ REVIEW   (default)
#   block = stop BEFORE voice spend (strictest; skips that day's video)
retention:
  enabled: true
  gate: "draft"
  max_revisions: 2
  reveal_min_frac: 0.55      # main reveal lands at 55-85% of the words —
  reveal_max_frac: 0.85      # reward early, then deepen (reference-channel study)
  max_open_loops: 2          # concurrent major open questions
  max_reward_gap_words: 60   # ≈25s at real pace without a meaningful reward
  max_same_role_run: 2       # no 3 consecutive scenes with one narrative role
  engine_active_until: 0.75  # milestone variable must keep moving until here
  rehook_tolerance: 0.12     # re-hook must exist near 25/50/75% (±12%)
  duration_tolerance: 0.10   # rendered narration within ±10% of target

# Six-minute quality system. The free Gemini beat-planning pass binds each
# spoken idea to a concrete visual instead of rotating loosely related assets.
longform_quality:
  visual_beats:
    enabled: true
    hook_max_seconds: 3.8  # faster semantic changes during the cold open
    max_seconds: 5.0       # matches the renderer's normal shot ceiling
    min_per_scene: 2
    max_per_scene: 12
  dynamic_music:
    enabled: true
    transition_seconds: 0.45
    hook_factor: 0.72
    calm_factor: 0.86
    reveal_factor: 0.58
    urgent_factor: 0.66
  render_qc:
    enabled: true
    gate: false            # report problems; set true only after several clean runs
    min_semantic_coverage: 0.90
    max_asset_uses: 2
  overlay_seconds: 5.0     # impact window for kinetic/stat/card/glass graphics

tts:
  engine: "sarvam"         # "sarvam" = your cloned Hindi voice (bulbul:v3).
                           # Auto-falls back to Kokoro if the API fails.
                           # Set to "kokoro" to force the free offline voice.
  sarvam_model: "bulbul:v3"
  sarvam_speaker: "amit"   # used ONLY if the SARVAM_SPEAKER secret is missing.
                           # Your cloned voice ID belongs in the secret.
  temperature: 0.6         # bulbul:v3 expressiveness (0.01-2.0)
  speed: 0.95              # pace for BOTH engines (Sarvam pace / Kokoro speed)
  voice: "hm_omega"        # Kokoro fallback voice (Hindi): hf_alpha, hf_beta,
                           # hm_omega, hm_psi
  fail_on_fallback: false  # true = fail workflow after preserving a draft for inspection

llm:
  provider: "auto"         # "auto" = Claude for scripts when ANTHROPIC_API_KEY
                           # secret exists (crisper writing, ~₹4/script),
                           # otherwise Gemini free tier. Claude failures
                           # auto-fall back to Gemini.
  anthropic_model: "claude-sonnet-4-6" # newest sonnet this key actually
                                       # serves (claude-sonnet-5 404s on the
                                       # generate endpoint — Test Script #2).
                                       # If a name 404s, the pipeline asks the
                                       # API what models YOUR key has and
                                       # self-heals to the newest sonnet/haiku
  anthropic_fallback_models: ["claude-sonnet-4-5", "claude-haiku-4-5-20251001"]
  model: "gemini-2.5-flash"
  # tried in order if the model above is retired/404s:
  fallback_models: ["gemini-3-flash", "gemini-flash-latest", "gemini-2.0-flash"]
  temperature: 0.9

brand:
  name: "TERRA INCOGNITA"
  tagline: "दुनिया की छुपी जगहों की खोज"   # metadata only — not shown on outro
  watermark_opacity: 0.08  # corner logo watermark on every frame

render:
  engine: "remotion"       # "remotion" (motion design) or "moviepy" (simple);
                           # remotion auto-falls back to moviepy on any error
  accent: "#FFB020"        # brand amber: captions, lower thirds, progress bar
  progress_bar: true       # thin accent bar along the top edge
  # visual styles rotate automatically per video: documentary -> kinetic
  # -> editorial -> noir -> repeat (see remotion/src/styles.ts)

# Animated hero shots — Kling 2.6 Pro image-to-video on fal animates the
# hook's first beat and the reveal scene (docs/HERO_SHOTS_SPEC.md).
# QC-gated (vision_qc, free); a rejected clip ships its source still instead.
hero_shots:
  enabled: true            # live on the scheduled Make Video runs (fail-open:
                           # any hero failure ships the still; $ cap below)
  model: "fal-ai/kling-video/v2.6/pro/image-to-video"
  fallback_model: "fal-ai/kling-video/v2.5-turbo/pro/image-to-video"
  max_per_video: 2         # hook + reveal
  seconds: 5               # fits max_shot_seconds: 5 — no renderer change
  max_retries: 1           # ONE regenerate after QC reject, then keep the still
  audio: false             # sfx.py + mastering own the soundtrack
  in_shorts: false         # long-form only for now
  max_usd_per_video: 1.20  # hard cost gate: 2 shots + 1 retry + margin

ai_images:
  enabled: true            # AI-generated stills for scenes stock can't cover
  # FLUX via fal.ai — used automatically when the FAL_KEY secret is set.
  # Signature-shot quality; ~$0.05/image (dev) — a video costs ~$0.20.
  flux_model: "fal-ai/flux/dev"
  flux_fallback: "fal-ai/flux/schnell"   # ~10x cheaper, slightly softer
  max_per_video_flux: 4    # richer AI visuals when FLUX is on
  # Gemini image API — free fallback (~500/day) when no FAL_KEY:
  max_per_video: 2
  # FLUX rescue stills for beats whose stock video failed or was QC-rejected —
  # targeted spend exactly where the narration binding is weakest:
  rescue_budget: 6
  model: "gemini-2.5-flash-image"
  fallback_models: ["gemini-3-flash-image", "gemini-2.0-flash-preview-image-generation"]

short:                     # vertical Shorts/Reels (Make Short workflow, Tue/Thu/Sat)
  # ADAPTIVE length: the script decides inside this band — one crisp fact
  # lands near min; journey/checkpoint topics use the top. Fixed 28s cut
  # stories off mid-promise (viewer: "feels incomplete").
  min_seconds: 40          # verdict after 25-32s tests: under 40s never satisfies
  max_seconds: 55
  target_seconds: 45       # midpoint; used for overrun warning + loop tail
  rescue_budget: 3         # AI stills for scenes where stock found nothing
  wpm: 100                 # REAL Sarvam Hindi pace incl. pauses (measured ~95-105;
                           # the 130 planning rate produced 38s shorts from 28s targets)
  scenes_min: 4
  scenes_max: 6
  crossfade: 0.25          # faster cuts than long-form
  max_shot_seconds: 2.4    # fast novelty; renderer now treats this as a hard ceiling
  overlay_seconds: 3.5     # impact window: graphics land on the spoken word,
                           # hold ~3.5s, then hand the frame back to footage
  captions_max_chars: 24   # 3-5 word thought groups (fragments hurt comprehension;
                           # karaoke word-pops keep the energy)
  caption_y: 0.62          # centered-low, inside the Shorts UI safe zone
  music_volume: 0.18       # music matters more in shorts
  loop_tail_seconds: 0.20  # brief completed-sentence breath before replay
  tts_speed: 1.0
  ai_images_max: 1
  ai_images_max_flux: 2    # when FAL_KEY is set
  progress_bar: false      # Shorts player has its own progress bar
  visual_beats:            # semantic beats for shorts: imagery changes with
    enabled: true          # the spoken idea, not a rotation timer
    hook_max_seconds: 1.6  # faster semantic changes on the hook scene
    max_seconds: 2.4       # matches the portrait shot ceiling
    min_per_scene: 1
    max_per_scene: 6

music:
  volume: 0.12             # 0 disables music even if files exist
  fade: 1.5
  auto_ambient: true       # synthesize a loop-safe cinematic bed when music/ is empty

audio_mastering:
  enabled: true
  target_lufs: -14.0       # competitive mobile loudness; YouTube can turn down safely
  true_peak_db: -1.5
  lra: 7.0

sfx:                       # synthesized sound design (whoosh/riser/hit)
  enabled: true
  volume: 0.5

qc:
  visual_check: true       # Gemini vision sanity-checks every stock clip
                           # (free tier; fail-open — never blocks a run)
  frames: 3                # sample 20/50/80% of each stock clip, not just one frame
  max_upscale: 1.25        # reject obvious blur after portrait crop/upscale
  max_requests_per_video: 20  # hard cost/rate-limit ceiling for vision QC
  render_audit_required: false  # true = a skipped/errored post-render audit is
                                # INDETERMINATE and drafts the release (enable
                                # after several clean scheduled runs)

maps:
  enabled: true            # animated map-zoom scenes for place-based topics

motion_library:
  enabled: true            # deterministic native Remotion motion-element library
  cta_enabled: true        # one subtle subscribe + bell moment per video
  cta_in_shorts: false     # protect retention; watermark carries Shorts branding
  cta_seconds: 3.2
  cta_short_seconds: 1.8
  cta_title: "सब्सक्राइब करें"
  cta_subtitle: "नई खोजें हर हफ्ते"

captions:
  enabled: true
  max_chars: 30            # per caption line (Devanagari glyphs run wider)
  font_size: 58
  align: true              # Sarvam STT word timestamps; heuristic fallback on error
  align_window_seconds: 25 # Sarvam REST requests stay under its short-audio limit

factcheck:
  enabled: true            # Gemini Google Search review before TTS
  max_claims: 10           # narration + packaging (title/thumb/tease) claims
  gate: high_risk          # high_risk = unsupported HIGH-RISK claims mark the
                           # release DRAFT-DO-NOT-PUBLISH · true = any
                           # unsupported claim blocks · false = advisory only
